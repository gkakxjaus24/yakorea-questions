<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>메인 페이지</title>
  <link rel="stylesheet" href="./css/common.css" />
  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#1a73e8" />
  <link rel="apple-touch-icon" href="/images/icon-192.png" />
</head>

<body>
  <header class="headline" id="dynamic-headline"></header>

  <main class="grid-container">
    <div class="grid-item"></div>
    <div class="grid-item">
      <div id="language-buttons" class="language-buttons">
        <button class="language-button" id="btn-english">English</button>
        <button class="language-button" id="btn-chinese">中文</button>
        <button class="language-button" id="btn-japanese">日本語</button>
        <button class="language-button" id="btn-korean">한국어</button>
      </div>
    </div>
    <div class="grid-item">
      <div id="common-buttons"></div>
    </div>
  </main>
  <!-- 카메라 요소 (움직임 감지용) -->
  <video id="camera" autoplay playsinline style="display: none;"></video>
  <canvas id="canvas" style="display: none;"></canvas>

  <!-- 설정 및 공통 JS -->
  <script src="./js/config.js"></script>
  <script src="./js/i18n.js"></script>
  <script src="./js/app.js"></script>
  <script src="./js/index.js"></script>

  <!-- Firebase SDK 및 FCM 클라이언트 -->
  <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-messaging-compat.js"></script>
  <script src="./js/fcm-client.js"></script>

  <!-- 체크인 시간 맞춰 재생할 음성 (단일 M4A 파일로 변경) -->
  <audio id="checkinReady">
    <source src="./audio/CHECK_IN_READY.m4a" type="audio/mp4" />
  </audio>


  <!-- 야코리아 채팅 위젯 (테스트/운영 조건부 로딩) -->
  <script>
    // 1. 주소창 뒷부분에 특수 단어가 있는지 확인
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('chat') === 'new') {
      localStorage.setItem('use_new_chat', 'true'); // 새 채팅 켜기 기억
    } else if (urlParams.get('chat') === 'old') {
      localStorage.removeItem('use_new_chat');      // 새 채팅 끄기 기억
    }

    // 2. 브라우저가 기억하고 있는 상태 확인
    const useNewChat = localStorage.getItem('use_new_chat') === 'true';

    if (useNewChat) {
      // [테스트 모드] 새로운 야코리아 채팅 시스템 불러오기
      const newChatScript = document.createElement('script');
      // 앞선 대화에서 확인한 사용자님의 최신 채팅 서버 주소
      newChatScript.src = "https://projectclaude-production.up.railway.app/widget/chat-widget.js";
      document.body.appendChild(newChatScript);
      console.log('✅ 테스트 모드: 새로 개발한 채팅 로드됨');
    } else {
      // [운영 모드] 원래 사용중이던 기존 Tidio 불러오기
      const tidioScript = document.createElement('script');
      tidioScript.src = "//code.tidio.co/hpgcwfwwn4j31bkmo50bp6q28d70y2d2.js";
      tidioScript.async = true;
      document.body.appendChild(tidioScript);
      console.log('✅ 운영 모드: 기존 Tidio 로드됨');
    }
  </script>

</body>

</html>
