<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Language Selection</title>
  <link rel="stylesheet" href="css/common.css" />
</head>
<body>
  <div id="language-buttons">
    <button class="language-button lang-en" onclick="goToQnA('en')">English</button>
    <button class="language-button lang-zh" onclick="goToQnA('zh')">中文</button>
    <button class="language-button lang-ja" onclick="goToQnA('ja')">日本語</button>
    <button class="language-button lang-ko" onclick="goToQnA('ko')">한국어</button>
    <button class="language-button lang-ru" onclick="goToQnA('ru')">Русский</button>
    <button class="language-button lang-es" onclick="goToQnA('es')">Español</button>
  </div>

  <script>
    function goToQnA(lang) {
      window.location.href = `QnA.html?lang=${lang}`;
    }
  </script>
</body>
</html>
