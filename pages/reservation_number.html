<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2-1 예약 확인 페이지</title>
  <link rel="stylesheet" href="../css/common.css" />
  <link rel="stylesheet" href="../css/reservation_number.css" />


</head>

<body>
  <header class="headline"></header>

  <main class="grid-container">
    <div>
      <div class="input-row">
        <input type="text" id="reservationInput" class="reservation-input" autocomplete="off" autocorrect="off"
          spellcheck="false" autocomplete="new-password" placeholder="" />
        <button id="searchButton"></button>
      </div>

      <p id="inputGuide" class="input-guide"></p>
      <p id="errorMessage" class="error-message"></p>

      <div id="searchFailHelp" style="display:none; margin-top:14px; font-size:20px; line-height:1.5;">
        <!-- 내용은 JS에서 i18n으로 채워짐 -->
      </div>

      <!-- On-screen keyboard (Moved here to be below input) -->
      <div id="osk" class="osk hidden" aria-hidden="true">
        <div class="osk-bar">
          <div class="osk-title">Keyboard</div>
          <div class="osk-actions">
            <button type="button" class="osk-btn" data-action="bksp">⌫</button>
            <button type="button" class="osk-btn" data-action="clear">Clear</button>
            <button type="button" class="osk-btn osk-btn-primary" data-action="done">Done</button>
          </div>
        </div>

        <div class="osk-keys" id="oskKeys"></div>
      </div>



    </div>

    <div id="details" class="details"></div>

    <div class="grid-item">
      <div id="common-buttons"></div>
    </div>
  </main>

  <script src="../js/config.js"></script>
  <script src="../js/i18n.js"></script>
  <script src="../js/app.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://unpkg.com/hangul-js"></script>
  <script src="../js/reservation_number.js"></script>
</body>

</html>
