<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>메인 페이지</title>
    <link rel="stylesheet" href="../css/common.css" />
    <style>
      .button-grid {
        display: grid;
        grid-template-columns: repeat(2, 100px);
        grid-template-rows: repeat(3, 90px);
        gap: 10px;
        justify-content: center;
        align-content: center;
      }
      .lang-button {
        border: 3px solid black;
        background-color: white;
        color: black;
        font-size: 1.4rem;
        cursor: pointer;
        width: 100px;
        height: 100px;
      }
      .language-button {
        padding: 15px 30px;
        font-size: 2.5em;
        background-color: white;
        color: #333;
        border: 3px solid #333;
        border-radius: 25px;
        cursor: pointer;
        transition: all 0.3s;
        margin: 10px;
        min-width: 150px;
        text-align: center;
      }
      .language-button:hover {
        background-color: #f0f0f0;
        transform: scale(1.05);
      }
      .language-buttons {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        margin: 20px 0;
      }
    </style>
  </head>

  <script src="//code.tidio.co/hpgcwfwwn4j31bkmo50bp6q28d70y2d2.js" async></script>

  <body>
    <header class="headline" id="dynamic-headline"></header>

    <main class="grid-container">
      <div class="grid-item"></div>
      <div class="grid-item">
        <div id="language-buttons" class="language-buttons">
          <button class="language-button" id="btn-english">English</button>
          <button class="language-button" id="btn-chinese">中文</button>
          <button class="language-button" id="btn-japanese">日本語</button>
          <button class="language-button" id="btn-korean">한국어</button>
        </div>
      </div>
      <div class="grid-item">
        <div id="common-buttons"></div>
      </div>
    </main>
    <!-- 카메라 요소 (움직임 감지용) -->
    <video id="camera" autoplay playsinline style="display: none;"></video>
    <canvas id="canvas" style="display: none;"></canvas>

    <!-- 공통 JS -->
    <script src="../js/common.js"></script>

    <script>
      function updateHeadline() {
        const now = new Date();
        const hours = now.getHours();
        const headline = document.getElementById("dynamic-headline");

        if (hours >= 15 && hours < 23) {
          headline.textContent = "💻👆SELF CHECK-IN";
        } else if (hours >= 23 || hours < 5) {
          headline.textContent = "FRONT DESK IS CLOSED🕰️❌";
        } else if (hours >= 5 && hours < 11) {
          headline.textContent = "NO NEED TO CHECK OUT 😄✋";
        } else {
          headline.textContent = "CLEANING TIME🛏️🧹";
        }
      }

      updateHeadline();
      setInterval(updateHeadline, 60000);

      function getTargetPage(language) {
        const now = new Date();
        const hours = now.getHours();
        if (hours >= 15 && hours < 23) {
          return `self_check_in.html?lang=${language}`;
        } else if (hours >= 23 || hours < 5) {
          return `reception_closed.html?lang=${language}`;
        } else if (hours >= 5 && hours < 11) {
          return `no_check_out.html?lang=${language}`;
        } else {
          return `cleaning_time.html?lang=${language}`;
        }
      }

      document.getElementById("btn-korean").addEventListener("click", () => {
        window.location.href = getTargetPage("ko");
      });
      document.getElementById("btn-chinese").addEventListener("click", () => {
        window.location.href = getTargetPage("zh");
      });
      document.getElementById("btn-japanese").addEventListener("click", () => {
        window.location.href = getTargetPage("ja");
      });
      document.getElementById("btn-english").addEventListener("click", () => {
        window.location.href = getTargetPage("en");
      });

      // ✅ 오후 3시에만 한 번 음성 안내
      let played = false;
      function playCheckinAnnouncement() {
        const readyAudio = document.getElementById("checkinReady");
        readyAudio.play().catch(err => console.error("오디오 재생 오류:", err));
      }

      function checkTimeAndPlay() {
        const now = new Date();
        if (now.getHours() === 15 && now.getMinutes() === 0 && !played) {
          playCheckinAnnouncement();
          played = true;
        }
      }
      setInterval(checkTimeAndPlay, 10000);

      // ✅ 움직임 감지 후 음성 안내 (랜덤 EN + 랜덤 ZH ×2세트 + 쿨다운 1분)
      const video = document.getElementById("camera");
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");

      // === 설정값 ===
      const COOLDOWN = 90_000; // 1분 30초 쿨타임
      const REQUIRED_ACTIVE_MS = 3_000;
      const DIFF_THRESHOLD =  9_000_000;
      const FLASH_INTERVAL = 200;

      // [추가] 테두리 그라데이션 두께(px) — 화면 가장자리에서 안쪽으로 번짐
const FLASH_BORDER_THICKNESS = 100;

      // === 상태값 ===
      let lastImageData = null;
      let voicePlaying = false;
      let lastVoiceTime = 0;
      let motionStartTime = null;
      let flashTimer = null;
      let stableCount = 0;

      // === 랜덤 파일 선택 ===
      function getRandomFile(prefix, count) {
        const index = Math.floor(Math.random() * count) + 1;
        return `../audio/${prefix}_${index}.m4a`;
      }

// 화면 테두리만 반짝이는 오버레이를 띄우는 함수
function startFlash() {
  // 이미 떠 있는 오버레이가 있으면 제거
  let existingOverlay = document.getElementById("flashOverlay");
  if (existingOverlay) existingOverlay.remove();

  // 오버레이 엘리먼트 생성
  const overlay = document.createElement("div");
  overlay.id = "flashOverlay";
  overlay.style.position = "fixed";
  overlay.style.inset = "0";                 // top/left/right/bottom = 0
  overlay.style.pointerEvents = "none";      // 클릭 막지 않음
  overlay.style.zIndex = "9999";
  overlay.style.boxSizing = "border-box";

  // [핵심] 테두리에서 안쪽으로 번지는 4방향 그라데이션을 배경으로 만듭니다.
  //       각 방향(위/아래/좌/우)으로 color → transparent로 50px 번지도록 설정.
  //       색상은 더 진한 하늘색(rgba 70,170,255,*). 알파는 배경 내부에서 설정하고,
  //       깜빡임은 opacity로 부드럽게 제어합니다.
  const T = `${FLASH_BORDER_THICKNESS}px`;
  const EDGE_COLOR = "rgba(70, 170, 255, 0.9)";   // 테두리 발광 색(진한 하늘색)
  const EDGE_TRANSPARENT = "rgba(70, 170, 255, 0)";

  overlay.style.backgroundImage = [
    // 상단: 위→아래로 50px 그라데이션
    `linear-gradient(to bottom, ${EDGE_COLOR}, ${EDGE_TRANSPARENT} ${T})`,
    // 하단: 아래→위로 50px 그라데이션
    `linear-gradient(to top, ${EDGE_COLOR}, ${EDGE_TRANSPARENT} ${T})`,
    // 좌측: 왼→오른쪽으로 50px 그라데이션
    `linear-gradient(to right, ${EDGE_COLOR}, ${EDGE_TRANSPARENT} ${T})`,
    // 우측: 오른→왼쪽으로 50px 그라데이션
    `linear-gradient(to left, ${EDGE_COLOR}, ${EDGE_TRANSPARENT} ${T})`
  ].join(",");

  // 각 그라데이션의 영역(크기)과 위치 지정
  overlay.style.backgroundSize = `100% ${T}, 100% ${T}, ${T} 100%, ${T} 100%`;
  overlay.style.backgroundPosition = `0 0, 0 100%, 0 0, 100% 0`;
  overlay.style.backgroundRepeat = "no-repeat";

  // [중요] 깜빡임은 opacity로 처리 → 부드러운 페이드 인/아웃
  overlay.style.opacity = "0";
  overlay.style.transition = "opacity 0.25s ease";

  document.body.appendChild(overlay);

  // 토글로 깜빡임
  let on = false;
  flashTimer = setInterval(() => {
    on = !on;
    // 1이면 최대 밝기, 0이면 완전 투명
    overlay.style.opacity = on ? "1" : "0";
  }, FLASH_INTERVAL);
}

// 반짝임을 멈추고 오버레이 제거
function stopFlash() {
  clearInterval(flashTimer);
  const overlay = document.getElementById("flashOverlay");
  if (overlay) {
    // 서서히 사라지게 한 뒤 제거
    overlay.style.opacity = "0";
    setTimeout(() => overlay.remove(), 300); // transition 시간과 맞춤
  }
}


      // === 음성 1세트 (EN→ZH) 재생 함수 ===
      function playVoiceSet(setCount, totalSets) {
  const enFile = getRandomFile("EN", 9);
  const zhFile = getRandomFile("ZH", 9);

  console.log(`🎧 세트 ${setCount}/${totalSets}: ${enFile} → ${zhFile}`);

  const enAudio = new Audio(enFile);
  const zhAudio = new Audio(zhFile);

  // ✅ 개별 음량 비율
  enAudio.volume = 1.0;
  zhAudio.volume = 1.0;

  // ✅ Web Audio API로 전체 볼륨 약 3배 증폭
  try {
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const gainNode = audioCtx.createGain();
    gainNode.gain.value = 0.8; // 🔊 전체 음량 3배

    // 각각 오디오를 게인 노드에 연결
    const enSrc = audioCtx.createMediaElementSource(enAudio);
    const zhSrc = audioCtx.createMediaElementSource(zhAudio);
    enSrc.connect(gainNode).connect(audioCtx.destination);
    zhSrc.connect(gainNode).connect(audioCtx.destination);
  } catch (err) {
    console.warn("GainNode 생성 실패 (브라우저 제한일 수 있음):", err);
  }

  // 🎧 재생 순서: 영어 → 중국어
  enAudio.play().catch(err => console.error("EN 재생 오류:", err));
  enAudio.onended = () => {
    zhAudio.play().catch(err => console.error("ZH 재생 오류:", err));
    zhAudio.onended = () => {
      if (setCount < totalSets) {
        setTimeout(() => playVoiceSet(setCount + 1, totalSets), 1000);
      } else {
        stopFlash();
        voicePlaying = false;
        lastVoiceTime = Date.now();
        console.log("✅ 모든 안내음성 2회 재생 완료 (쿨다운 시작)");
      }
    };
  };
}


// === 움직임 감지 ===
function detectMotion() {
  const now = Date.now();

  // ✅ 안내음성은 07:00 ~ 23:00에만 재생
  const h = new Date().getHours();
  if (h < 7 || h >= 23) return;

  // ✅ 쿨다운 중이거나 이미 재생 중이면 스킵
  if (now - lastVoiceTime < COOLDOWN || voicePlaying) return;

  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
  const current = ctx.getImageData(0, 0, canvas.width, canvas.height);

  if (lastImageData) {
    let diff = 0;
    for (let i = 0; i < current.data.length; i += 4) {
      diff += Math.abs(current.data[i] - lastImageData.data[i]);
    }

    const motionDetected = diff > DIFF_THRESHOLD;

    if (motionDetected) {
      if (motionStartTime === null) motionStartTime = now;
      stableCount = 0;

      if (now - motionStartTime >= REQUIRED_ACTIVE_MS) {
        motionStartTime = null;
        voicePlaying = true;

        startFlash();
        playVoiceSet(1, 2);
      }
    } else {
      stableCount++;
      if (stableCount > 10) motionStartTime = null;
    }
  }

  lastImageData = current;
}


      navigator.mediaDevices.getUserMedia({ video: true })
        .then((stream) => {
          video.srcObject = stream;
          video.onloadedmetadata = () => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            setInterval(detectMotion, 500);
          };
        })
        .catch((err) => {
          console.error("웹캠 접근 오류:", err);
        });
    </script>

    <!-- 체크인 시간 맞춰 재생할 음성 (단일 M4A 파일로 변경) -->
    <audio id="checkinReady">
      <source src="../audio/CHECK_IN_READY.m4a" type="audio/mp4" />
    </audio>

    <script>
      document.addEventListener("keydown", function (event) {
        if (event.key === "F1") {
          event.preventDefault();
          return false;
        }
      });
    </script>
  </body>
</html>
