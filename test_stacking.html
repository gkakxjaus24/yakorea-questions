<!DOCTYPE html>
<html>

<head>
    <style>
        .test {
            position: relative;
            width: 200px;
            height: 100px;
            background-color: red;
            z-index: 1;
        }

        .test::before {
            content: "Pseudo";
            position: absolute;
            top: 50%;
            left: 50%;
            z-index: -1;
            background-color: blue;
            width: 100px;
            height: 50px;
        }
    </style>
</head>

<body>
    <div class="test">Text</div>
    <script>
        console.log("If blue pseudo is visible, z-index -1 is OVER red background.");
    </script>
</body>

</html>
